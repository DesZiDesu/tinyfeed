<div class="tinyfeed-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>TinyFeed 📱</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <label class="checkbox_label" for="tinyfeed-enabled">
                <input id="tinyfeed-enabled" type="checkbox" />
                <span>แสดงปุ่ม TinyFeed ในเมนู extensions</span>
            </label>
            <small class="tinyfeed-hint">ปิดตัวเลือกนี้เพื่อซ่อนปุ่มจากแผงเมนู</small>
        </div>
    </div>
</div>
